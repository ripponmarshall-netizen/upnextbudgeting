<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f2f3f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="UpNextBudgeting">
    <title>UpNextBudgeting</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <main id="app" class="screen" aria-live="polite"></main>

      <nav class="tabbar" aria-label="Primary">
        <button class="tab is-active" data-tab="upcoming" type="button">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 7.5h14M5 12h10M5 16.5h7"/><path d="M17 14.5l2 2 3-3"/></svg>
          </span>
          <span>Upcoming</span>
        </button>
        <button class="tab" data-tab="calendar" type="button">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M7 3.5v3M17 3.5v3M4.5 9h15"/><rect x="4.5" y="5.5" width="15" height="15" rx="2.5"/><path d="M8 13h.01M12 13h.01M16 13h.01M8 17h.01M12 17h.01"/></svg>
          </span>
          <span>Calendar</span>
        </button>
        <button class="tab" data-tab="budget" type="button">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 17.5V10M12 17.5V6.5M19 17.5v-4"/><path d="M4 20h16"/><rect x="3.5" y="8" width="3" height="9.5" rx="1"/><rect x="10.5" y="4.5" width="3" height="13" rx="1"/><rect x="17.5" y="11.5" width="3" height="6" rx="1"/></svg>
          </span>
          <span>Budget</span>
        </button>
      </nav>
    </div>

    <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
    <section class="quick-sheet" id="quickSheet" aria-labelledby="sheetTitle" aria-modal="true" role="dialog" hidden>
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-top">
        <div>
          <p class="eyebrow">New reminder</p>
          <h2 id="sheetTitle">Add a bill</h2>
        </div>
        <button class="icon-button" id="closeSheet" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <form id="billForm" class="bill-form">
        <label>
          <span>Name</span>
          <input id="billName" name="name" autocomplete="off" required placeholder="JPS electricity">
        </label>
        <div class="form-row">
          <label>
            <span>Amount</span>
            <input id="billAmount" name="amount" inputmode="numeric" required placeholder="18500">
          </label>
          <label>
            <span>Due</span>
            <input id="billDate" name="date" type="date" required>
          </label>
        </div>
        <label>
          <span>Category</span>
          <select id="billCategory" name="category"></select>
        </label>
        <label>
          <span>Repeats</span>
          <select id="billRepeat" name="repeat">
            <option value="none">Does not repeat</option>
            <option value="monthly">Monthly</option>
            <option value="quarterly">Quarterly</option>
            <option value="yearly">Yearly</option>
          </select>
        </label>
        <label class="check-row" id="paidRow" hidden>
          <input id="billPaid" name="paid" type="checkbox">
          <span>Already paid</span>
        </label>
        <button class="primary-action" type="submit">Add to Upcoming</button>
        <button class="danger-action" id="deleteBill" type="button" hidden>Delete bill</button>
      </form>
      <div class="preset-area">
        <p class="microcopy">Jamaica-first presets</p>
        <div id="presetRail" class="preset-rail"></div>
      </div>
    </section>

    <section class="quick-sheet settings-sheet" id="settingsSheet" aria-labelledby="settingsTitle" aria-modal="true" role="dialog" hidden>
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-top">
        <div>
          <p class="eyebrow">App settings</p>
          <h2 id="settingsTitle">Settings</h2>
        </div>
        <button class="icon-button light" id="closeSettingsSheet" type="button" aria-label="Close settings">
          <svg viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <div id="settingsContent"></div>
    </section>
    <section id="printExport" class="print-export" aria-hidden="true"></section>

    <script src="app.js" type="module"></script>
  </body>
</html>
